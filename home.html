<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- font wasome link -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- favicon -->
     <link rel="shortcut icon" href="./images/unnamed.png" type="image/x-icon">
    <!-- daisyui and tailwind link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font link -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body class="">
   
<nav>
    <div class="navbar bg-base-100 shadow-sm flex justify-between items-center ">
 
    <div class="flex items-center gap-3" >
    <img class="w-11" src="./images/github-logo.png" alt="">
    <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>

  <div class="flex">
   <div class="relative w-64"> <input id="Search-input" type="text" placeholder="Search issues..." class=" pl-6 input input-bordered w-24 md:w-auto" />
<i class="fa-brands fa-sistrix  absolute left-1 top-3 "></i>
</div>
    <button id="Search" class="btn btn-primary">Search</button>
  </div>
 
</div>
</nav>

<main>
    <!-- button section -->
<section class="w-10/12 mx-auto">
<div id="filter-buttons" class="filter-buttons mt-12 mb-4 shadow p-4">
     <button onclick="filterIssues('all',event)" class="btn btn-primary px-10">All</button>
    <button onclick="filterIssues('open',event)" class="btn btn-soft" >Open</button>
    <button onclick="filterIssues('closed',event)" class="btn btn-soft">Closed</button>
</div>


<div class=" flex justify-between items-center my-8 p-6 bg-blue-100">
<div class="flex items-center gap-2">
    <div class="">
        <img src="./images/Aperture.png" alt="">       
    </div>
    <div class=""><h4 id="issues" class="text-xl font-bold">0 Issues</h4>
    <p class="text-gray-500">Track and manage your project issues</p></div>
</div>
    <div class="flex items-center gap-3">
        <div class="bg-green-500 rounded-full w-4 h-4"></div>
        <p>Open</p>
        <div class="bg-[#A855F7] rounded-full w-4 h-4"></div>
        <p>Closed</p>
    </div>
</div>

<div id="loading-spinner" class=" text-red-600 hidden flex justify-center my-10">
        <span class="loading loading-infinity loading-xl"></span>
    </div>
<section id="card-container" class="grid grid-cols-4 gap-3">

    
</section>

</section>

<dialog id="issue_modal" class="modal">
  <div class="modal-box p-0 bg-transparent shadow-none max-w-md">
    <div id="modal-content">
        </div>
    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </div>
</dialog>



</main>
    <script src="./script.js"></script>
</body>
</html>
