<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- favicon -->
     <link rel="shortcut icon" href="./images/unnamed.png" type="image/x-icon">
    <!-- daisyui and tailwind link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font link -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body class="bg-gray-100">
   <section class="flex justify-center items-center" >
    <div class=" bg-gray-50 shadow rounded-2xl my-20 md:w-1/3 ">
        <div class="px-3">
        <div class="flex justify-center"><img src="./images/github-logo.png" alt=""></div>
        <h2 class="text-center font-bold text-2xl mt-4">GitHub Issues Tracker login</h2>
        <p class=" text-center text-gray-700 mb-4">Sign in to manage your issues</p>
    </div>

    <div class="flex justify-center items-center">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 flex-col">
  <!-- <legend class="fieldset-legend">Login</legend> -->

  <label class="label font-bold">Username</label>
  <input id="input" type="text" class="input" placeholder="Enter Username admin" />

  <label class="label font-bold">Password</label>
  <input id="password" type="password" class="input" placeholder="Enter Password admin123" />

  <button id="login-btn" class="btn btn-primary w-full mt-4">Sign In</button>
</fieldset>
    </div>
   
    <div class="text-center py-5">
         <p class="text-center font-semibold ">OR</p>
    
    <p class=" text-gray-600 font-semibold">Demo Credentials:</p>
       <p>Username: <span class="text-gray-400 text-sm">admin</span></p>
       <p>Password: <span class="text-gray-400 text-sm">admin123</span></p>
    </div>
    </div>
   </section>
   <script src="./login.js"></script>
</body>
</html>
